name: fythaniya_admin
description: "فى ثانية – Admin Dashboard"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  go_router: ^13.2.0
  dio: ^5.4.3
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.1
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  socket_io_client: ^2.0.3+1
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.1
  flutter_local_notifications: ^17.0.0
  intl: ^0.20.2
  percent_indicator: ^4.2.3
  badges: ^3.1.2
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.6
  local_auth: ^2.2.0
  local_auth_android: ^1.0.39
  local_auth_darwin: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-ExtraBold.ttf
          weight: 800

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F1729"
  adaptive_icon_foreground: "assets/images/logo.png"
