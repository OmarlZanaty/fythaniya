name: fythaniya
description: "فى ثانية – E-Payment Platform"
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  go_router: ^13.2.0
  dio: ^5.4.3
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.1
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  cached_network_image: ^3.3.1
  intl: ^0.20.2
  percent_indicator: ^4.2.3
  socket_io_client: ^2.0.3+1
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.1
  flutter_local_notifications: ^17.0.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.6
  image_picker: ^1.0.7
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
